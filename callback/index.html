<!DOCTYPE html>
<html>
<head><title>TAP Redirect</title></head>
<body>
<p>Weiterleitung zur TAP App...</p>
<script>
  const params = window.location.search;
  const tapUrl = "tap://callback" + params;
  window.location.replace(tapUrl);
  setTimeout(function() {
    document.body.innerHTML = "<p>Bitte öffne die TAP App manuell falls die Weiterleitung nicht funktioniert.</p>";
  }, 3000);
</script>
</body>
</html>
